<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Variables CSS para colores */
        :root {
            --primary-color: #007bff; /* Azul vibrante */
            --primary-dark: #0056b3; /* Azul más oscuro para hover */
            --text-color: #333;       /* Gris oscuro para texto */
            --light-gray: #f8f9fa;    /* Gris muy claro para fondo */
            --border-color: #ced4da; /* Gris claro para bordes */
            --card-bg: #ffffff;       /* Fondo blanco para la tarjeta */
            --shadow-color: rgba(0, 0, 0, 0.1); /* Sombra suave */
            --error-color: #dc3545;   /* Rojo para errores */
            --success-color: #28a745; /* Verde para éxito */
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #a8dadc 0%, #457b9d 100%); /* Gradiente de fondo suave */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
            line-height: 1.6;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px var(--shadow-color); /* Sombra más pronunciada */
            text-align: center;
            max-width: 400px;
            width: 75%;
            animation: fadeIn 0.8s ease-out; /* Animación de entrada */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 2.2em;
        }

        h2 {
            color: black;
            margin-bottom: 7px;
            font-weight: 500;
            font-size: 1.5em;
        }

        .links {
            margin-top: 30px;
            font-size: 0.9em;
        }
        .links a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .links a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Chekea tu Email</h1>
            <img src="{{ url_for ('static', filename='mensaje.png') }}" width="70" height="70" alt="check email">
                    <h2>Te Hemos enviado un Email con un enlace de confirmacion. Por favor verifique antes de iniciar seccion </h2>


            <p class="links">
                <a href="{{ url_for('security.register') }}">¿No tienes cuenta? Regístrate</a><br>
                <a href="{{ url_for('security.forgot_password') }}">¿Olvidaste tu contraseña?</a>
            </p>
        </form>
    </div>
</body>
</html>
